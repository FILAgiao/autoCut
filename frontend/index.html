<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCut</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div id="app">
  <!-- ====== 顶部栏 ====== -->
  <header id="top-bar">
    <span class="logo">AutoCut</span>
    <span id="progress-text">就绪</span>
    <div id="top-actions">
      <button id="btn-subtitle-settings" title="字幕设置" style="display:none;">⚙</button>
      <button id="btn-preview" title="预览成品" style="display:none;">▶ 预览成品</button>
      <button id="btn-export" disabled title="Ctrl+S">导出剪映草稿</button>
      <button id="btn-auto-confirm" disabled title="Ctrl+Enter">一键确认</button>
      <button id="btn-theme" title="切换主题">🌙</button>
    </div>
  </header>

  <!-- ====== 上传区（初始显示） ====== -->
  <section id="upload-area">
    <div class="upload-hero">
      <h1>口播视频智能剪辑</h1>
      <p>上传你的口播视频，AI 自动识别、对齐脚本、找出每一句最好的那遍</p>
    </div>

    <div class="upload-card">
      <h2><span class="card-icon">📹</span> 上传视频</h2>
      <div class="drop-zone" id="video-drop-zone">
        <input type="file" id="video-input" accept="video/*" hidden>
        <span class="drop-icon">📁</span>
        <span>拖拽视频到此处，或 <a href="#" id="video-browse">点击选择</a></span>
        <span class="hint">支持 MP4 / MOV / AVI，最大 500MB</span>
      </div>
      <div id="video-info" class="file-info hidden">
        <span id="video-name"></span>
        <span id="video-size"></span>
        <span id="video-duration"></span>
      </div>
    </div>

    <div class="upload-card">
      <h2><span class="card-icon">📝</span> 粘贴口播脚本 <span class="optional-badge">可选</span></h2>
      <textarea id="script-input" placeholder="一句一行，例如：&#10;大家好我是小飞&#10;今天给大家分享一个好东西&#10;这个功能真的很好用&#10;&#10;不填则自动从语音中检测聚类相似的片段" rows="10"></textarea>
      <span class="hint">
        <span id="script-line-count">0 句</span>
        <span id="script-mode-hint" style="color:var(--accent)">— 留空将启用智能聚类模式</span>
      </span>
    </div>

    <button id="btn-start" disabled>开始处理</button>
    <div id="upload-status"></div>
  </section>

  <!-- ====== 主编辑区（处理完成后显示） ====== -->
  <section id="editor-area" class="hidden">
    <!-- 时间轴总览 -->
    <div id="timeline-bar">
      <canvas id="timeline-canvas"></canvas>
    </div>

    <!-- 三栏布局 -->
    <div id="editor-columns">
      <!-- 左栏：脚本列表 -->
      <aside id="script-panel">
        <button class="panel-toggle" id="toggle-script-panel" title="折叠面板">◀</button>
        <div id="script-mode-label">脚本行</div>
        <div id="script-list"></div>
      </aside>

      <!-- 中栏：视频预览 -->
      <main id="video-panel">
        <video id="video-player" controls disablepictureinpicture>
          您的浏览器不支持视频播放
        </video>
        <canvas id="subtitle-canvas"></canvas>
        <div id="take-info">
          <span id="take-grade"></span>
          <span id="take-time"></span>
          <span id="take-duration"></span>
          <span id="take-tags"></span>
        </div>
        <div id="take-actions">
          <button id="btn-play" title="Space">⏵ 播放此段</button>
          <button id="btn-confirm" title="Enter">✓ 确认选中</button>
          <button id="btn-reject" title="R">✕ 拒掉此遍</button>
        </div>
      </main>

      <!-- 右栏：版本列表 -->
      <aside id="takes-panel">
        <button class="panel-toggle" id="toggle-takes-panel" title="折叠面板">▶</button>
        <div id="current-sentence-label"></div>
        <div id="takes-list"></div>
        <div id="unmatched-panel" class="hidden">
          <h3>── 未匹配片段 ──</h3>
          <div id="unmatched-list"></div>
        </div>
      </aside>
    </div>

    <!-- 底部快捷键提示 -->
    <footer id="shortcut-bar">
      <span>← → 切句</span>
      <span>↑ ↓ 切换本</span>
      <span>Enter 确认</span>
      <span>Space 播放</span>
      <span>R 拒掉</span>
      <span>1-9 速选</span>
      <span>Ctrl+Enter 全确认</span>
      <span>Ctrl+S 导出</span>
    </footer>
  </section>

  <!-- ====== 字幕设置浮动面板 ====== -->
  <div id="subtitle-panel" class="hidden anim-slide-down">
    <div class="subtitle-panel-header">
      字幕样式设置
      <button class="subtitle-panel-close" id="btn-close-subtitle">✕</button>
    </div>
    <div class="subtitle-panel-body">
      <div class="subtitle-field">
        <label>字体</label>
        <select id="sub-font">
          <option value="Source Han Sans SC">思源黑体</option>
          <option value="Microsoft YaHei">微软雅黑</option>
          <option value="PingFang SC">苹方</option>
          <option value="SimHei">黑体</option>
          <option value="KaiTi">楷体</option>
          <option value="Arial">Arial</option>
        </select>
      </div>
      <div class="subtitle-field">
        <label>字号比例</label>
        <input type="range" id="sub-font-size" min="0.04" max="0.16" step="0.01" value="0.08">
      </div>
      <div class="subtitle-field">
        <label>文本颜色</label>
        <div class="sub-color-row">
          <input type="color" id="sub-color" value="#FFFFFF">
          <span id="sub-color-val">#FFFFFF</span>
        </div>
      </div>
      <div class="subtitle-field">
        <label>描边颜色</label>
        <div class="sub-color-row">
          <input type="color" id="sub-stroke-color" value="#000000">
          <span id="sub-stroke-color-val">#000000</span>
        </div>
      </div>
      <div class="subtitle-field">
        <label>描边宽度</label>
        <input type="range" id="sub-stroke-width" min="0" max="0.12" step="0.01" value="0.04">
      </div>
      <div class="subtitle-field">
        <label>重点词颜色</label>
        <div class="sub-color-row">
          <input type="color" id="sub-keyword-color" value="#FFD700">
          <span id="sub-keyword-color-val">#FFD700</span>
        </div>
      </div>
      <div class="subtitle-field">
        <label>Y 位置</label>
        <input type="range" id="sub-position-y" min="-0.9" max="-0.1" step="0.05" value="-0.75">
      </div>
      <div class="subtitle-field">
        <label>每行最大字数</label>
        <input type="range" id="sub-max-chars" min="8" max="24" step="1" value="12">
        <span style="font-size:11px;color:var(--text-dim)" id="sub-max-chars-val">12 字</span>
      </div>
    </div>
  </div>

  <!-- ====== 预览成品 Modal ====== -->
  <div id="preview-modal" class="hidden">
    <div id="preview-video-container">
      <video id="preview-video" controls disablepictureinpicture></video>
      <canvas id="preview-subtitle-canvas"></canvas>
    </div>
    <div id="preview-controls">
      <span id="preview-time">00:00 / 00:00</span>
      <div id="preview-progress">
        <div id="preview-progress-fill" style="width:0%"></div>
      </div>
      <button id="btn-close-preview">✕ 关闭预览</button>
    </div>
  </div>
</div>

<script src="/static/js/keyword.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/player.js"></script>
<script src="/static/js/timeline.js"></script>
<script src="/static/js/keyboard.js"></script>
</body>
</html>
